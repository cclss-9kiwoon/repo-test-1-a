<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Text Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="./assets/index-CcWPgCi5.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-LQNMZgmc.css">
</head>
<body>
  <!-- Header Ad -->
  <header id="ad-header" class="ad-slot ad-header">
    <div class="ad-placeholder">AD 728x90</div>
  </header>

  <!-- Main Layout -->
  <div id="app-layout">
    <!-- Left Sidebar Ad -->
    <aside id="ad-left" class="ad-slot ad-sidebar">
      <div class="ad-placeholder">AD<br>160x600</div>
    </aside>

    <!-- Central Content -->
    <main id="main-content">
      <!-- Controls Bar -->
      <div id="controls-bar">
        <input type="text" id="text-input" placeholder="Type something..." maxlength="200" autocomplete="off" />

        <div id="shape-selector">
          <button class="shape-btn active" data-shape="circle" title="Circle">&#9679;</button>
          <button class="shape-btn" data-shape="star" title="Star">&#9733;</button>
          <button class="shape-btn" data-shape="diamond" title="Diamond">&#9670;</button>
          <button class="shape-btn" data-shape="random" title="Random">&#10022;</button>
          <label id="cycle-shape-label">
            <input type="checkbox" id="cycle-shape" />
            <span>Cycle</span>
          </label>
        </div>

        <div id="color-controls">
          <input type="color" id="color-picker" value="#ffffff" />
          <label id="random-color-label">
            <input type="checkbox" id="random-color" />
            <span>Rainbow</span>
          </label>
        </div>

        <div class="slider-group">
          <label for="speed-slider">Speed</label>
          <input type="range" id="speed-slider" min="0.2" max="3" step="0.1" value="1" />
          <span id="speed-value" class="slider-value">1.0x</span>
        </div>

        <div class="slider-group">
          <label for="density-slider">Density</label>
          <input type="range" id="density-slider" min="0.3" max="2" step="0.1" value="1" />
          <span id="density-value" class="slider-value">1.0</span>
        </div>

        <div class="slider-group">
          <label for="fontsize-slider">Size</label>
          <input type="range" id="fontsize-slider" min="0" max="150" step="5" value="0" />
          <span id="fontsize-value" class="slider-value">Auto</span>
        </div>

        <div id="export-controls">
          <div class="slider-group">
            <label for="gif-duration">GIF</label>
            <input type="range" id="gif-duration" min="3" max="15" step="1" value="5" />
            <span id="gif-duration-value" class="slider-value">5s</span>
          </div>
          <select id="gif-quality">
            <option value="low">Low ~1MB</option>
            <option value="medium" selected>Mid ~3MB</option>
            <option value="high">High ~5MB</option>
          </select>
          <button id="export-btn" disabled>Export GIF</button>
        </div>
      </div>

      <!-- Width Markers -->
      <div id="width-marker-bar">
        <div class="wm-track">
          <div class="wm-track-fill"></div>
        </div>
        <div class="wm-handle wm-handle-left" title="Left text boundary">&#9660;</div>
        <div class="wm-handle wm-handle-right" title="Right text boundary">&#9660;</div>
      </div>

      <!-- Canvas Area -->
      <div id="canvas-container">
        <canvas id="particle-canvas"></canvas>
      </div>
    </main>

    <!-- Right Sidebar Ad -->
    <aside id="ad-right" class="ad-slot ad-sidebar">
      <div class="ad-placeholder">AD<br>160x600</div>
    </aside>
  </div>

  <!-- Bottom Ad -->
  <footer id="ad-bottom" class="ad-slot ad-bottom">
    <div class="ad-placeholder">AD 728x90</div>
  </footer>

  <!-- Ad Modal -->
  <div id="ad-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="ad-placeholder modal-ad">AD 300x250</div>
      <button id="ad-modal-close">Close & Download</button>
    </div>
  </div>

  <!-- Export Progress -->
  <div id="export-progress" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="spinner"></div>
      <p>Generating GIF...</p>
    </div>
  </div>

</body>
</html>
