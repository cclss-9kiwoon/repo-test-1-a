<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Petit Prince — Sunset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p>Loading Sunset...</p>
    </div>
  </div>

  <!-- 3D Canvas -->
  <canvas id="webgl"></canvas>

  <!-- Text Overlay (top-left) -->
  <div class="planet-text-overlay visible" id="planet-text">
    <div class="planet-text-line active" data-step="0">
      <p class="planet-quote">"하루는 해 지는 광경을 마흔네 번이나 봤어!"</p>
    </div>
    <div class="planet-text-line" data-step="1">
      <p class="planet-quote">잠시 뒤에 너는 또 이렇게 말했어.</p>
    </div>
    <div class="planet-text-line" data-step="2">
      <p class="planet-quote">"있잖아… 나는 몹시 슬플 때면 해 지는 광경을 보고 싶거든…"</p>
    </div>
    <div class="planet-text-line" data-step="3">
      <p class="planet-quote">"마흔네 번이나 해 지는 걸 봤던 날, 넌 그렇게나 슬펐던 거야?"</p>
    </div>
    <div class="planet-text-line" data-step="4">
      <p class="planet-quote">어린 왕자는 대답하지 않았다.</p>
      <p class="planet-caption">— Le Petit Prince</p>
    </div>
  </div>

  <!-- Click Hint (bottom-center) -->
  <div class="planet-click-hint" id="planet-click-hint">
    인물을 클릭하면 그의 시선으로 볼 수 있어요
  </div>

  <!-- Controls (top-right) -->
  <div id="controls">
    <div class="control-group">
      <label class="control-label" for="brightness-slider">밝기</label>
      <input type="range" id="brightness-slider" class="control-slider" min="0" max="100" value="50" />
    </div>
    <button id="replay-btn" class="control-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 8a6 6 0 0 1 10.2-4.3L11 5h4V1l-1.5 1.5A7.96 7.96 0 0 0 0 8h2zm12 0a6 6 0 0 1-10.2 4.3L5 11H1v4l1.5-1.5A7.96 7.96 0 0 0 16 8h-2z" fill="currentColor"/>
      </svg>
      다시 보기
    </button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
