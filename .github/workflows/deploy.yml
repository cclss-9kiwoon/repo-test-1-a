name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Build Weather project (v1)
      - name: Install Weather dependencies
        run: rm -f package-lock.json && npm install

      - name: Build Weather
        run: npm run build

      # Build Sunset project (v2)
      - name: Install Sunset dependencies
        working-directory: planet-game
        run: rm -f package-lock.json && npm install

      - name: Build Sunset
        working-directory: planet-game
        run: npm run build

      # Assemble final site
      - name: Assemble site
        run: |
          mkdir -p _site/weather _site/sunset _site/sous-vide-idle
          cp landing/index.html _site/
          cp -r dist/* _site/weather/
          cp -r planet-game/dist/* _site/sunset/
          cp -r sous-vide-idle/*.html sous-vide-idle/*.css sous-vide-idle/*.js _site/sous-vide-idle/
          cp -r sous-vide-idle/data _site/sous-vide-idle/data
          cp -r sous-vide-idle/systems _site/sous-vide-idle/systems

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
