name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Weather project (v1)
      - name: Install Weather dependencies
        run: npm ci

      - name: Build Weather
        run: npm run build

      # Build Sunset project (v2)
      - name: Install Sunset dependencies
        working-directory: sunset-project
        run: npm ci

      - name: Build Sunset
        working-directory: sunset-project
        run: npm run build

      # Assemble final site
      - name: Assemble site
        run: |
          mkdir -p _site/weather _site/sunset
          cp landing/index.html _site/
          cp -r dist/* _site/weather/
          cp -r sunset-project/dist/* _site/sunset/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
